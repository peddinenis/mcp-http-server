server:
  port: 8081

spring:
  application:
    name: mcp-http-server
  ai:
    mcp:
      server:
        protocol: STREAMABLE
        name: project-mcp-server
        version: 1.0.0
        instructions: "Provides project tools for the Java Spring AI assistant"
        capabilities:
          tool: true
          resource: false
          prompt: false
          completion: false
        streamable-http:
          mcp-endpoint: /mcp